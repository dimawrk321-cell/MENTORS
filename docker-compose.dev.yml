# Dev-only compose: PostgreSQL для локальной разработки.
# Полный прод-компоуз (web/worker/pg/caddy) — этап 13.
services:
  postgres:
    image: postgres:16-alpine
    container_name: mentors-postgres
    environment:
      POSTGRES_USER: mentors
      POSTGRES_PASSWORD: mentors
      POSTGRES_DB: mentors
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mentors -d mentors"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
